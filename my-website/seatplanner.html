<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seat Planner</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
}

.container{
width:90%;
max-width:700px;
margin:30px auto;
background:white;
color:black;
padding:20px;
border-radius:10px;
}

h2{
text-align:center;
color:#2563eb;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#2563eb;
color:white;
}
</style>

</head>

<body>

<div class="container">

<h2>Seat Planner</h2>

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="roll" placeholder="Roll Number">

<input type="number" id="height" placeholder="Height (cm)">

<button onclick="addStudent()">Add Student</button>

<table>

<thead>

<tr>

<th>Name</th>

<th>Roll</th>

<th>Height</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<script>

let students=[];

function addStudent(){

let name=document.getElementById("name").value;

let roll=document.getElementById("roll").value;

let height=document.getElementById("height").value;

students.push({name,roll,height});

students.sort((a,b)=>a.height-b.height);

let table=document.getElementById("studentTable");

table.innerHTML="";

students.forEach(student=>{

table.innerHTML+=`
<tr>
<td>${student.name}</td>
<td>${student.roll}</td>
<td>${student.height}</td>
</tr>
`;

});

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("height").value="";

}

</script>

</body>
</html>
