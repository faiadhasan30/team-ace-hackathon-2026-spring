<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Kuddus Protocol</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:350px;
            padding:30px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,.3);
        }

        h1{
            color:#2563eb;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .footer{
            margin-top:15px;
            color:gray;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anti-Kuddus Protocol</h1>
    <p>Anonymous Student Login</p>

    <form action="dashboard.html">
        <input type="text" placeholder="Roll Number" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        BAIUST Computer Club Hackathon
    </div>
</div>

</body>
</html>
