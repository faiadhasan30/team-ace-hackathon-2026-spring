<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Anti-Kuddus Protocol</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
        }

        header{
            background:#1e40af;
            padding:20px;
            text-align:center;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:30px;
        }

        .card{
            background:white;
            color:black;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 5px 10px rgba(0,0,0,.3);
        }

        .progress{
            width:100%;
            height:20px;
            background:#ddd;
            border-radius:10px;
            overflow:hidden;
            margin-top:10px;
        }

        .progress-bar{
            width:33%;
            height:100%;
            background:red;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:15px;
            margin-top:20px;
        }

        button{
            padding:15px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        footer{
            text-align:center;
            padding:20px;
            margin-top:40px;
            color:#ccc;
        }

        /* Emergency SOS Button */
.emergency-btn{
    position: fixed;
    top: 20px;
    right: 20px;
    background: #dc2626;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,.4);
    transition: 0.3s;
    z-index: 1000;
}

.emergency-btn:hover{
    background: #b91c1c;
    transform: scale(1.08);
}
    </style>
</head>

<body>

<header>
    <h1>Anti-Kuddus Protocol</h1>
    <p>Student Dashboard</p>

    <button class="emergency-btn" onclick="location.href='sos.html'">
            SOS Alert
        </button>
</header>

<div class="container">

    <div class="card">
        <h2>Welcome Student</h2>
       

        <h3>Strike Progress</h3>

        <div class="progress">
            <div class="progress-bar"></div>
        </div>

        <p>Warnings: 1 / 3</p>
    </div>

    <div class="buttons">

        <button onclick="location.href='complaint.html'">
            Complaint Form
        </button>

        <button onclick="location.href='seatplanner.html'">
            Seat Planner
        </button>

        <button onclick="location.href='summary.html'">
            AI Summary
        </button>

        <button onclick="location.href='factchecker.html'">
            Fact Checker
        </button>

        <button onclick="location.href='ledger.html'">
            Tiffin Ledger
        </button>

        <button onclick="location.href='index.html'">
            Logout
        </button>

    </div>

</div>

<footer>
    © 2026 Anti-Kuddus Protocol | BAIUST Computer Club
</footer>

</body>
</html>
