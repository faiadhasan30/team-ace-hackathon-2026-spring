<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Syllabus Summary</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}
.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
}
h2{
    text-align:center;
    color:#2563eb;
}
textarea{
    width:100%;
    height:180px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
#output{
    margin-top:20px;
    background:#f1f5f9;
    padding:15px;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="container">

<h2>AI Syllabus Summarizer</h2>

<textarea id="input" placeholder="Paste the syllabus here..."></textarea>

<button onclick="summary()">Generate Summary</button>

<div id="output">
Summary will appear here...
</div>

</div>

<script>

function summary(){

let text=document.getElementById("input").value;

if(text==""){
    alert("Please enter syllabus");
    return;
}

document.getElementById("output").innerHTML=
"<h3>Summary</h3><ul><li>"+text.substring(0,150)+"...</li></ul>";

}

</script>

</body>
</html>
