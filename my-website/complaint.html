<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Form</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    color:black;
    padding:25px;
    border-radius:10px;
}

h2{
    text-align:center;
    color:#2563eb;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>

<body>

<div class="container">

<h2>Complaint Form</h2>

<form>

<label>Category</label>

<select>
<option>Tiffin Theft</option>
<option>Bribe</option>
<option>Syllabus Bloat</option>
<option>Seat Issue</option>
<option>Other</option>
</select>

<label>Description</label>

<textarea rows="5" placeholder="Write your complaint here..."></textarea>

<button type="button" onclick="submitComplaint()">
    Submit Complaint
</button>

</form>

</div>
<script>
function submitComplaint(){

    let category = document.querySelector("select").value;
    let description = document.querySelector("textarea").value;

    if(description.trim() == ""){
        alert("Please write your complaint.");
        return;
    }

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints.push({
        category: category,
        description: description,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("complaints", JSON.stringify(complaints));

    alert("Complaint Submitted Successfully!");

    document.querySelector("textarea").value = "";
}
</script>

</body>
</html>
