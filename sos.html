<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS Alert</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}
.container{
    width:400px;
    margin:60px auto;
    background:white;
    color:black;
    padding:25px;
    border-radius:10px;
    text-align:center;
}
h2{
    color:#dc2626;
}
select{
    width:100%;
    padding:10px;
    margin:20px 0;
}
button{
    width:100%;
    padding:15px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:darkred;
}
#message{
    margin-top:20px;
    font-weight:bold;
    color:green;
}
</style>

</head>
<body>

<div class="container">

<h2>🚨 SOS Rescue Flare</h2>

<select id="location">
<option>Classroom</option>
<option>Library</option>
<option>Playground</option>
<option>Corridor</option>
<option>Canteen</option>
</select>

<button onclick="sendSOS()">Send SOS Alert</button>

<p id="message"></p>

</div>

<script>
function sendSOS(){

let location=document.getElementById("location").value;

document.getElementById("message").innerHTML=
"✅ SOS Alert Sent Successfully!<br>Location: "+location;

}
</script>

</body>
</html>
